<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    //Step 4 - Throw and Custom Errors
    class ValidationError extends Error {
      constructor(message) {
        super(message);
        this.name = 'ValidationError';
      }
    }

    class NetworkError extends Error {
      constructor(message, url) {
        super(message);
        this.name = 'NetworkError';
        this.url = url;
      }
    }
    // Step 5 - The Global Error handler and 3rd Party Tracking
  window.onerror = function(message, source, lineno, colno, error) {   
      if (error) {
        console.error(error);
      } else {
        console.error(`${message} at line ${lineno}`);
      }
      return true;
    };

    window.addEventListener("unhandledrejection", function(event) {
      console.error(`[Unhandled Promise Rejection] ${event.reason?.message || event.reason}`);
      event.preventDefault();
    });

    //Step 3 - Trying Try/Catch
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');

      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        if (firstNum === '' || secondNum === '') {
          throw new ValidationError('Both fields are required');
        }
        let result = eval(`${firstNum} ${operator} ${secondNum}`);
        if (!isFinite(result)) {
          throw new RangeError('Cannot divide by zero');
        }
        output.innerHTML = result;
      } catch (e) {
        if (e instanceof ValidationError) {
          console.error(`[ValidationError] ${e.message}`);
          output.innerHTML = `ValidationError: ${e.message}`;
        } else if (e instanceof RangeError) {
          console.error(`[RangeError] ${e.message}`);
          output.innerHTML = `RangeError: ${e.message}`;
        } else {
          console.error('[Unknown Error]', e);
          output.innerHTML = 'Unknown error';
        }
      } finally {
        console.log('[finally] Attempt finished.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    //Step 2 -  Adding Buttons for Console Testing

    const sampleData = [
      { name: 'Software Engineer',  num: '110'  },
      { name: 'Programming Language', num: '130' },
      { name: 'Advanced Sfotware',   num: '112' },
    ];

    //console.log
    errorBtns[0].addEventListener('click', () => {
      console.log('Console Log Demo');
    });

    //console.error
    errorBtns[1].addEventListener('click', () => {
      console.error('Console Error Demo');
    });
    
    //console.count
    errorBtns[2].addEventListener("click", () => {
      console.count("Count Button");
    });

    //console.warn
    errorBtns[3].addEventListener("click", () => {
      console.warn("Console Warn Button");
    });

    //console.assert
    errorBtns[4].addEventListener("click", () => {
      let firstNum1 = document.querySelector("#first-num").value;
      let secondNum2 = document.querySelector("#second-num").value;

      if (firstNum1 === "") {
        firstNum1 = 2;
      }

      if (secondNum2 === "") {
        secondNum2 = 3;
      }

      console.assert(
        firstNum1 == secondNum2,
        {
          number: firstNum1,
          errorMsg: `The number does not equal ${secondNum2}`
        }
      );
    });

    //console.clear
    errorBtns[5].addEventListener("click", () => {
      console.clear();
    });

    //console.dir
    errorBtns[6].addEventListener("click", () => {
      console.dir(errorBtns[6]); 
    });
    //console.dirxml
    errorBtns[7].addEventListener("click", () => {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(`<button>Console dirxml</button>`, "text/xml");
      console.dirxml(xmlDoc.documentElement);
    });

    //console.group
    errorBtns[8].addEventListener("click", () => {
      console.group("User Report");
      console.log("Users:", sampleData.length);
      console.log("Roles:");
      sampleData.forEach(user => console.log(user.role));
    });
    
    //console group end
    errorBtns[9].addEventListener("click", () => {
      console.groupEnd();
    });

    //console.table
    errorBtns[10].addEventListener("click", () => {
      console.table(sampleData);
    });
    
    //console.time
    errorBtns[11].addEventListener("click", () => {
      console.time("Timer Button ");
    });

    //console.time
    errorBtns[12].addEventListener("click", () => {
      console.timeEnd("Timer Button ");
    });

    //console.trace
    errorBtns[13].addEventListener("click", () => {
      function deep() {
        deeper();
      }
      function deeper() {
        deepest();
      }
      function deepest() {
        console.trace();
      }
      deep();
    });

    errorBtns[14].addEventListener("click", () => {
      setTimeout(() => {
        nonexistentFunction();
      }, 0);
    });

  </script>
</body>

</html>
